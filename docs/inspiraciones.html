<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planes para inspirarte</title>

    <link rel="stylesheet" href="/css/main.css">
</head>

<body>

    <nav class="navbar--primary" aria-label="Navegación principal">

        <a class="nav-brand" href="#" data-accion="menu" aria-label="El Tunco Beach — volver al inicio">
            El Tunco Beach
        </a>

        <button class="nav-toggle" type="button" aria-label="Abrir menú de navegación" aria-expanded="false"
            aria-controls="nav-opciones">
            &#9776;
        </button>

        <ul class="nav-menu" id="nav-opciones" role="list">

            <!-- Solo visible en el menú principal -->
            <li id="nav-li-iniciar" role="listitem">
                <button class="btn btn-sm btn-light" type="button" data-accion="iniciar"
                    aria-label="Iniciar recorrido de actividades">
                    Iniciar
                </button>
            </li>

            <!-- Solo visibles dentro de una card -->
            <li id="nav-li-atras" class="d-none" role="listitem">
                <button class="btn btn-sm btn-light" type="button" data-accion="atras"
                    aria-label="Ir a la actividad anterior">
                    ← Atrás
                </button>
            </li>

            <li id="nav-li-adelante" class="d-none" role="listitem">
                <button class="btn btn-sm btn-light" type="button" data-accion="adelante"
                    aria-label="Ir a la siguiente actividad">
                    Adelante →
                </button>
            </li>

        </ul>
    </nav>

    <script src="./main.js"></script>
</body>

</html>
